name: tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  unittest:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # Юнит-тестам нужны только эти две зависимости: соединение Telegram
      # (websockets + cryptography). GUI-модули (pywebview/pystray) app.py
      # импортирует лениво, поэтому в тестах они не требуются.
      - name: Install test dependencies
        run: python -m pip install "websockets>=15.0" "cryptography>=44.0"
      - name: Run unit tests
        run: python -m unittest discover -s tests -t . -v
